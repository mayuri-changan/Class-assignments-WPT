<!-- from html accept 
    FirstName  textfield
    LastName  textfield
    birthDate    <input type="date"/>
  on button click <generate username>
Generate UserName  as follows and display in P Tag 
    first 2 characters from firstname 
    +age+last2characters from lastname  -->

    <!DOCTYPE html>
    <html>
    <body>
    
    <h3>Username Generator</h3>
    
    First Name:
    <input type="text" id="fname"><br><br>
    
    Last Name:
    <input type="text" id="lname"><br><br>
    
    Birth Date:
    <input type="date" id="bdate"><br><br>
    
    <button onclick="generateUsername()">Generate Username</button>
    
    <p id="result"></p>
    
    <script>
    
    function generateUsername()
    {
        var fname = document.getElementById("fname").value;
        var lname = document.getElementById("lname").value;
        var bdate = document.getElementById("bdate").value;
    
        // First 2 characters from firstname
        var firstPart = fname.substring(0,2);
    
        // Last 2 characters from lastname
        var lastPart = lname.substring(lname.length-2);
    
        // Calculate age
        var birthYear = new Date(bdate).getFullYear();
        var currentYear = new Date().getFullYear();
        var age = currentYear - birthYear;
    
        var username = firstPart + age + lastPart;
    
        document.getElementById("result").innerHTML =
        "Generated Username: " + username;
    }
    
    </script>
    
    </body>
    </html>

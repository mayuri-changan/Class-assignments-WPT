<html>
<head>
<title>Paragraph Color Change</title>

<script>
function changeColor()
{
    var color = document.getElementById("clr").value;

    document.getElementById("p1").style.color = color;
    document.getElementById("p2").style.color = color;
    document.getElementById("p3").style.color = color;
    document.getElementById("p4").style.color = color;

    document.getElementById("p1").style.fontWeight = "bold";
    document.getElementById("p2").style.fontWeight = "bold";
    document.getElementById("p3").style.fontWeight = "bold";
    document.getElementById("p4").style.fontWeight = "bold";
}
</script>

</head>

<body>

<p id="p1">This is paragraph 1</p>
<p id="p2">This is paragraph 2</p>
<p id="p3">This is paragraph 3</p>
<p id="p4">This is paragraph 4</p>

<br>

Enter Color:
<input type="text" id="clr" placeholder="red / blue / green">

<br><br>

<button onclick="changeColor()">Change Color</button>


</body>
</html>

<html>
<head>
<title>Square of Number</title>

<script>
function showSquare()
{
    var num = document.getElementById("num").value;
    var sq = num * num;

    document.getElementById("result").innerHTML = "Square = " + sq;
}
</script>

</head>

<body>

<h2>Find Square of a Number</h2>

Enter Number:
<input type="number" id="num" required>

<br><br>

<button onclick="showSquare()">Find Square</button>

<p id="result"></p>

</body>
</html>

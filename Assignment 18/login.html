<!DOCTYPE html>
<html>
<head>
    <title>Assignment 6</title>
</head>
<script type="text/javascript">
    function validation() {
        // 3) Define 2 objects and prototype print
        let data = {
            "name" : "GK",
            "id" : 1,
            "grade" : 'A'
        };

        let data1 = {
            "name" : "Komal",
            "id" : 2,
            "grade" : 'B'
        };

        Object.prototype.print = function() {
            return "Name: " + this.name + ", Id: " + this.id + ", Grade: " + this.grade;
        }

        // Show objects on UI
        document.getElementById("objectsOutput").innerHTML =
            "<b>Object 1:</b> " + data.print() + "<br>" +
            "<b>Object 2:</b> " + data1.print();

        // 2) Predefined callback function
        let cnt = 0;
        let id = setInterval(call, 1000);
        function call() {
            cnt++;
            document.getElementById("callbackOutput").innerHTML += "Inside Call() " + cnt + "<br>";
            if (cnt == 5) {
                clearInterval(id);
            }
        }

        // 1) Login validation
        let u = document.forms["f1"]["uName"].value;
        let pswd = document.forms["f1"]["pass"].value;

        if(u.trim() == "" || u.length < 2 || !isNaN(u)) {
            alert("Please Enter Valid Name, It should not contain number & It can't be empty or less than 2 characters!");
            return false;
        } else if(pswd.trim() == "" || pswd.length < 8 || pswd.length > 12) {
            alert("Invalid Password! Length must be between 8 to 12 chars long!");
            return false;
        }
        if(u != "iet" || pswd != "iet") {
            alert("Invalid, can't proceed to Home Page");
            return false;
        }

        // 4) Student object in JSON format
        let student = {
            StudentId: 101,
            StudentName: "Komal",
            Grade: "A"
        };
        let jsonData = JSON.stringify(student);
        document.getElementById("studentOutput").innerHTML = "<b>Student JSON:</b> " + jsonData;

        return true; // forwards to Home.html
    }
</script>
<body>
    <strong> Login </strong><br>
    <form name="f1" action="Home.html" onsubmit="return validation()">
        <label for="uName"> Username </label>
        <input type="text" name="uName" id="uName"/><br>
        <label for="pass"> Password </label>
        <input type="password" name="pass" id="pass"/><br>
        <input type="submit" value="Submit">
        <input type="reset" />
    </form>

    <hr>
    <h3>Outputs on UI</h3>
    <p id="objectsOutput" style="color:green;"></p>
    <p id="callbackOutput" style="color:blue;"></p>
    <p id="studentOutput" style="color:purple;"></p>
</body>
</html>

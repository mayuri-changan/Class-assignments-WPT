<!-- Using AJAX concept load data from given url 
https://fakestoreapi.com/products

and display data in html page in table format 

    id | Title | price -->
    
    <html>
<head>
<title>AJAX Product Table</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

    $.ajax({
        url: "https://fakestoreapi.com/products",
        type: "GET",
        success: function(data){

            var table = "";

            for(var i=0; i<data.length; i++)
            {
                table += "<tr>";
                table += "<td>"+data[i].id+"</td>";
                table += "<td>"+data[i].title+"</td>";
                table += "<td>"+data[i].price+"</td>";
                table += "</tr>";
            }

            $("#tbody").html(table);
        }
    });

});
</script>

</head>

<body>

<h2>Product List</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Title</th>
<th>Price</th>
</tr>

<tbody id="tbody"></tbody>

</table>

</body>
</html>

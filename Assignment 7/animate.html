<!-- take div on your html with width 50 and height 50 px 
   on start button click  animate that div to left to right and change height and width -->


<html>
<head>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

    $("#start").click(function(){

        $("#box").animate({
            left: '300px',
            width: '100px',
            height: '100px'
        });

    });

});
</script>

<style>
#box{
    width:50px;
    height:50px;
    background-color:red;
    position:relative;
}
</style>

</head>

<body>

<button id="start">Start</button>

<br><br>

<div id="box"></div>

</body>
</html>

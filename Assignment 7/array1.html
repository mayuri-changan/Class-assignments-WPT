<!-- create Object 
let b = {
	id:100,
	name:"abc"
	email:"abc@gmail.com"
}

display elements of array using for in loop  -->

<html>
<body>

<script>


let b = {
    id: 100,
    name: "abc",
    email: "abc@gmail.com"
};


for (let key in b) {
    document.write(key + " : " + b[key] + "<br>");
}

</script>

</body>
</html>
